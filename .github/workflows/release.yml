name: Release

on:
  push:
    tags:
      - 'v*'   # запускается при git tag v0.1.0

permissions:
  contents: write  # нужно для создания Release

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: tucha
            archive: tucha-macos-arm64

          # macOS Intel (кросс-компиляция с ARM раннера)
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: tucha
            archive: tucha-macos-x86_64

          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: tucha
            archive: tucha-linux-x86_64

          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: tucha.exe
            archive: tucha-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ─── Linux: libopus + pkg-config ────────────────────────────────────
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libopus-dev libasound2-dev

      # ─── macOS: opus + autotools (нужны для кросс-компиляции audiopus_sys) ──
      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: brew install opus pkg-config autoconf automake libtool

      # ─── Windows: opus через vcpkg ───────────────────────────────────────
      - name: Install Windows deps
        if: runner.os == 'Windows'
        run: |
          vcpkg install opus:x64-windows-static
          echo "VCPKGRS_DYNAMIC=0" >> $env:GITHUB_ENV
          echo "VCPKG_ROOT=C:/vcpkg" >> $env:GITHUB_ENV
          echo "PKG_CONFIG_PATH=C:/vcpkg/installed/x64-windows-static/lib/pkgconfig" >> $env:GITHUB_ENV

      # ─── Кэш cargo registry ──────────────────────────────────────────────
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      # ─── Сборка release ───────────────────────────────────────────────────
      - name: Build
        if: matrix.target != 'x86_64-apple-darwin'
        run: cargo build -p tucha-client --release --target ${{ matrix.target }}
        env:
          PKG_CONFIG_PATH: ${{ runner.os == 'macOS' && '/opt/homebrew/lib/pkgconfig' || '' }}

      # audiopus_sys compiles Opus C sources via the cc crate.
      # Without explicit flags, cc uses the host arch (arm64).
      # CC_x86_64_apple_darwin / CFLAGS_x86_64_apple_darwin are standard
      # cc-crate env vars keyed by target triple (hyphens -> underscores).
      - name: Build (macOS Intel cross-compile)
        if: matrix.target == 'x86_64-apple-darwin'
        run: cargo build -p tucha-client --release --target x86_64-apple-darwin
        env:
          CC_x86_64_apple_darwin: clang
          CFLAGS_x86_64_apple_darwin: "-arch x86_64"
          CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER: clang
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig

      # ─── Упаковка ─────────────────────────────────────────────────────────
      - name: Pack (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} .
          tar czf ${{ matrix.archive }}.tar.gz ${{ matrix.artifact }} README.md
        shell: bash

      - name: Pack (Windows)
        if: runner.os == 'Windows'
        run: |
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.artifact }} .
          Compress-Archive -Path ${{ matrix.artifact }},README.md -DestinationPath ${{ matrix.archive }}.zip

      # ─── Загрузка артефактов ──────────────────────────────────────────────
      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}.tar.gz

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}.zip

  # ─── Создать GitHub Release и прикрепить бинарники ────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: artifacts/**/*
          body: |
            ## Установка

            ### macOS (Apple Silicon / M1+)
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/tucha-macos-arm64.tar.gz | tar xz
            chmod +x tucha
            ./tucha
            ```

            ### macOS (Intel)
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/tucha-macos-x86_64.tar.gz | tar xz
            chmod +x tucha
            ./tucha
            ```

            ### Linux
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/tucha-linux-x86_64.tar.gz | tar xz
            chmod +x tucha
            ./tucha
            ```

            ### Windows
            Скачайте `tucha-windows-x86_64.zip`, распакуйте и запустите `tucha.exe`
